<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fortress Fencing — Job Board</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f0f0d;--bg2:#161614;--bg3:#1e1e1b;--bg4:#272724;
  --line:#2a2a26;--line2:#3a3a34;
  --text:#e8e7e0;--text2:#a0a098;--text3:#606058;
  --gold:#c9952a;--gold2:#e8b040;
  --green:#3a8a52;--green2:#4fba6f;
  --red:#c0392b;--red2:#e74c3c;
  --blue:#2980b9;--blue2:#3daee9;
  --orange:#d35400;--orange2:#e67e22;
  --purple:#6c3483;--radius:4px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* LOGIN */
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem;}
.login-card{background:var(--bg2);border:1px solid var(--line2);border-radius:8px;padding:2.5rem 2rem;width:100%;max-width:380px;text-align:center;}
.login-logo{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:3px;color:var(--gold2);margin-bottom:4px;}
.login-sub{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:2rem;}
.login-btn{display:block;width:100%;padding:12px;margin-bottom:10px;border-radius:var(--radius);border:1px solid var(--line2);background:var(--bg3);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .15s;}
.login-btn:hover{border-color:var(--gold);color:var(--gold);}
.login-btn.owner{background:var(--gold);color:#000;border-color:var(--gold);font-weight:500;}
.login-btn.owner:hover{background:var(--gold2);}
.login-note{font-size:11px;color:var(--text3);margin-top:1rem;line-height:1.6;}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 1.25rem;height:52px;background:var(--bg2);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:100;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--gold2);}
.logo-sub{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;color:var(--text3);margin-left:8px;}
.role-badge{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:99px;margin-left:8px;}
.role-owner{background:rgba(201,149,42,.2);color:var(--gold2);}
.role-crm{background:rgba(41,128,185,.2);color:var(--blue2);}
.top-right{display:flex;gap:8px;align-items:center;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);}
.sync-dot.synced{background:var(--green2);}
.sync-dot.syncing{background:var(--gold2);animation:pulse .8s infinite;}
.sync-dot.error{background:var(--red2);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.sync-label{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);}

/* BUTTONS */
.btn{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.05em;padding:6px 13px;border:1px solid var(--line2);background:transparent;color:var(--text2);cursor:pointer;border-radius:var(--radius);transition:all .15s;text-transform:uppercase;}
.btn:hover{border-color:var(--gold);color:var(--gold);}
.btn.primary{background:var(--gold);color:#000;border-color:var(--gold);font-weight:500;}
.btn.primary:hover{background:var(--gold2);}
.btn.danger{border-color:var(--red);color:var(--red2);}
.btn.small{padding:3px 8px;font-size:10px;}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--line);background:var(--bg2);padding:0 1.25rem;}
.tab{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:11px 16px;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;transition:all .15s;margin-bottom:-1px;}
.tab:hover{color:var(--text2);}
.tab.active{color:var(--gold2);border-bottom-color:var(--gold2);}

/* MAIN */
.main{padding:1.25rem;}

/* STATS */
.stat-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:1.25rem;}
.stat{background:var(--bg2);border:1px solid var(--line);border-radius:var(--radius);padding:.8rem 1rem;}
.stat-label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:5px;}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;}
.stat-sub{font-size:11px;color:var(--text3);margin-top:1px;}

/* PIPELINE */
.pipeline{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;align-items:start;}
.pipeline-col{background:var(--bg2);border:1px solid var(--line);border-radius:var(--radius);padding:0 6px 6px;min-height:160px;}
.col-head{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);padding:8px 6px 6px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.col-count{background:var(--bg4);border-radius:10px;padding:1px 6px;font-size:10px;color:var(--text2);}

/* JOB CARD */
.job-card{background:var(--bg3);border:1px solid var(--line2);border-radius:var(--radius);padding:.7rem .8rem;margin-bottom:6px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden;}
.job-card:hover{border-color:var(--gold);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.4);}
.flag-bar{height:3px;position:absolute;top:0;left:0;right:0;}
.jc-name{font-size:13px;font-weight:500;margin-bottom:3px;padding-top:2px;}
.jc-type{font-size:11px;color:var(--text3);margin-bottom:5px;}
.jc-meta{display:flex;justify-content:space-between;align-items:center;}
.jc-val{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--gold);}
.jc-date{font-size:10px;color:var(--text3);}
.pdot{width:6px;height:6px;border-radius:50%;position:absolute;top:8px;right:8px;}
.p-high{background:var(--red2);}
.p-med{background:var(--orange2);}
.p-low{background:var(--green2);}
.prog-wrap{margin-top:5px;}
.prog-bar{height:3px;background:var(--line2);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;border-radius:2px;transition:width .3s;}

/* CRM VIEW */
.crm-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.crm-section{background:var(--bg2);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
.crm-section-head{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);padding:8px 12px;border-bottom:1px solid var(--line);background:var(--bg3);display:flex;justify-content:space-between;}
.crm-item{padding:.75rem 1rem;border-bottom:1px solid var(--line);cursor:pointer;transition:background .15s;}
.crm-item:last-child{border-bottom:none;}
.crm-item:hover{background:var(--bg3);}
.crm-item-name{font-size:13px;font-weight:500;margin-bottom:2px;}
.crm-item-meta{font-size:11px;color:var(--text3);line-height:1.5;}
.crm-item-val{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--gold);float:right;}
.followup-tag{font-size:10px;font-family:'IBM Plex Mono',monospace;padding:1px 7px;border-radius:99px;display:inline-block;margin-top:3px;}
.ft-urgent{background:rgba(192,57,43,.2);color:var(--red2);}
.ft-today{background:rgba(201,149,42,.2);color:var(--gold2);}
.ft-soon{background:rgba(41,128,185,.2);color:var(--blue2);}

/* INVOICE TABLE */
.inv-table{width:100%;border-collapse:collapse;}
.inv-table th{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding:7px 10px;border-bottom:1px solid var(--line);background:var(--bg3);text-align:left;}
.inv-table td{padding:9px 10px;border-bottom:1px solid var(--line);font-size:12px;}
.inv-table tr:hover td{background:var(--bg3);cursor:pointer;}
.is-tag{font-family:'IBM Plex Mono',monospace;font-size:9px;padding:2px 7px;border-radius:3px;}
.is-unpaid{background:rgba(192,57,43,.2);color:var(--red2);}
.is-deposit{background:rgba(201,149,42,.2);color:var(--gold2);}
.is-partial{background:rgba(211,84,0,.2);color:var(--orange2);}
.is-paid{background:rgba(58,138,82,.2);color:var(--green2);}
.is-overdue{background:rgba(192,57,43,.4);color:#ff8080;}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-start;justify-content:center;padding:1rem;overflow-y:auto;}
.overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--line2);border-radius:6px;width:100%;max-width:660px;margin:auto;animation:slideUp .2s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:1.1rem 1.4rem;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg2);z-index:2;}
.modal-head h2{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:1.5px;color:var(--gold2);}
.close-btn{background:none;border:none;color:var(--text3);font-size:22px;cursor:pointer;padding:0 4px;}
.close-btn:hover{color:var(--text);}
.modal-body{padding:1.25rem 1.4rem;}
.msec{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);padding:12px 0 8px;border-top:1px solid var(--line);margin-top:4px;}
.msec:first-child{border-top:none;padding-top:0;}
.fg{display:grid;gap:10px;margin-bottom:10px;}
.fg.two{grid-template-columns:1fr 1fr;}
.fg.three{grid-template-columns:1fr 1fr 1fr;}
.fg.one{grid-template-columns:1fr;}
.fw{display:flex;flex-direction:column;gap:4px;}
.fw label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);}
.fw input,.fw select,.fw textarea{background:var(--bg3);border:1px solid var(--line2);border-radius:var(--radius);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:13px;padding:7px 9px;outline:none;transition:border-color .15s;width:100%;}
.fw input:focus,.fw select:focus,.fw textarea:focus{border-color:var(--gold);}
.fw textarea{resize:vertical;min-height:64px;line-height:1.5;}
.fw select option{background:var(--bg3);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;padding:.9rem 1.4rem;border-top:1px solid var(--line);}

/* NOTES */
.note-item{background:var(--bg3);border-left:2px solid var(--gold);padding:.5rem .8rem;margin-bottom:5px;border-radius:0 var(--radius) var(--radius) 0;}
.note-meta{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);margin-bottom:2px;}
.note-text{font-size:12px;color:var(--text2);line-height:1.5;}

/* SCHEDULE */
.week-grid{display:grid;grid-template-columns:90px repeat(7,1fr);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
.whc{padding:7px 5px;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);text-align:center;border-right:1px solid var(--line);background:var(--bg3);}
.whc.today{color:var(--gold2);background:var(--bg4);}
.wrc{border-right:1px solid var(--line);border-bottom:1px solid var(--line);min-height:40px;padding:2px;background:var(--bg2);}
.wrc.today{background:var(--bg3);}
.wlabel{padding:6px 8px;font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--text3);border-right:1px solid var(--line);border-bottom:1px solid var(--line);background:var(--bg2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sblock{border-radius:2px;padding:2px 5px;font-size:10px;font-weight:500;margin-bottom:1px;cursor:pointer;line-height:1.4;}

/* EMPTY */
.empty{text-align:center;padding:2.5rem 1rem;color:var(--text3);font-size:13px;}

/* RESPONSIVE */
@media(max-width:960px){.pipeline{grid-template-columns:repeat(3,1fr);}}
@media(max-width:640px){
  .pipeline{grid-template-columns:repeat(2,1fr);}
  .crm-grid{grid-template-columns:1fr;}
  .fg.two,.fg.three{grid-template-columns:1fr;}
  .main{padding:.85rem;}
  .stat-strip{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="login-screen">
  <div class="login-card">
    <div class="login-logo">FORTRESS</div>
    <div class="login-sub">Fencing Partners LLC</div>
    <button class="login-btn owner" onclick="login('owner')">🔨 Owner / Field View</button>
    <button class="login-btn" onclick="login('crm')">📞 Office / CRM View<br><span style="font-size:10px;opacity:.6;">(Cherri)</span></button>
    <div class="login-note">Your job board syncs live between both views.<br>All data is shared in real time.</div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <div class="topbar">
    <div style="display:flex;align-items:center;">
      <span class="logo">FORTRESS</span>
      <span class="logo-sub">Fencing</span>
      <span class="role-badge" id="role-badge"></span>
    </div>
    <div class="top-right">
      <div class="sync-dot" id="sync-dot"></div>
      <span class="sync-label" id="sync-label">—</span>
      <button class="btn small" onclick="syncNow()">⟳ Sync</button>
      <button class="btn small primary" id="new-job-btn" onclick="openNewJob()">+ New Job</button>
      <button class="btn small" onclick="logout()">Switch</button>
    </div>
  </div>

  <div class="tabs" id="tab-bar"></div>

  <div class="main">
    <div class="stat-strip" id="stat-strip"></div>
    <div id="view-pipeline" style="display:none;"></div>
    <div id="view-crm"      style="display:none;"></div>
    <div id="view-schedule" style="display:none;"></div>
    <div id="view-invoices" style="display:none;"></div>
  </div>
</div>

<!-- JOB MODAL -->
<div class="overlay" id="job-modal">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modal-title">New Job</h2>
      <button class="close-btn" onclick="closeModal('job-modal')">×</button>
    </div>
    <div class="modal-body">
      <div class="msec">Client info</div>
      <div class="fg two">
        <div class="fw"><label>Client name *</label><input id="f-client" type="text" placeholder="Full name"></div>
        <div class="fw"><label>Phone</label><input id="f-phone" type="text" placeholder="(325) 000-0000"></div>
      </div>
      <div class="fg two">
        <div class="fw"><label>Email</label><input id="f-email" type="text" placeholder="email@example.com"></div>
        <div class="fw"><label>Job site address</label><input id="f-address" type="text" placeholder="123 Main St, Abilene TX"></div>
      </div>
      <div class="msec">Job details</div>
      <div class="fg three">
        <div class="fw"><label>Fence type</label>
          <select id="f-type">
            <option>6ft cedar privacy</option><option>4ft cedar privacy</option>
            <option>Chain link</option><option>Ornamental iron</option>
            <option>Split rail</option><option>Vinyl / PVC</option>
            <option>Farm / ranch wire</option><option>Other</option>
          </select>
        </div>
        <div class="fw"><label>Linear feet</label><input id="f-lf" type="number" placeholder="0" min="0"></div>
        <div class="fw"><label>Gate count</label><input id="f-gates" type="number" placeholder="0" min="0"></div>
      </div>
      <div class="fg one">
        <div class="fw"><label>Scope / notes for estimate</label><textarea id="f-scope" placeholder="Existing fence removal? Grade issues? Post type? Special requests..."></textarea></div>
      </div>
      <div class="fg three">
        <div class="fw"><label>Stage</label>
          <select id="f-stage">
            <option value="lead">Lead</option>
            <option value="estimate">Estimate Sent</option>
            <option value="scheduled">Scheduled</option>
            <option value="active">Active / In Progress</option>
            <option value="invoice">Invoice Sent</option>
            <option value="paid">Paid / Complete</option>
          </select>
        </div>
        <div class="fw"><label>Priority</label>
          <select id="f-priority"><option value="med">Medium</option><option value="high">High</option><option value="low">Low</option></select>
        </div>
        <div class="fw"><label>Follow-up date</label><input id="f-followup" type="date"></div>
      </div>
      <div id="owner-fields">
        <div class="msec">Schedule &amp; financials</div>
        <div class="fg three">
          <div class="fw"><label>Start date</label><input id="f-start" type="date"></div>
          <div class="fw"><label>Est. end date</label><input id="f-end" type="date"></div>
          <div class="fw"><label>Crew</label>
            <select id="f-crew"><option>Full crew (3)</option><option>2-man crew</option><option>Solo</option></select>
          </div>
        </div>
        <div class="fg three">
          <div class="fw"><label>Est. value ($)</label><input id="f-value" type="number" placeholder="0.00" step="0.01" oninput="calcDep()"></div>
          <div class="fw"><label>Deposit collected ($)</label><input id="f-deposit" type="number" placeholder="0.00" step="0.01"></div>
          <div class="fw"><label>40% deposit =</label><input id="f-dep-calc" readonly style="color:var(--gold);cursor:default;"></div>
        </div>
        <div class="fg two">
          <div class="fw"><label>Est. labor hours</label><input id="f-hours" type="number" placeholder="0" min="0"></div>
          <div class="fw"><label>Actual hours (running)</label><input id="f-actual" type="number" placeholder="0" step="0.5" min="0"></div>
        </div>
      </div>
      <div class="msec">Notes log <span style="font-weight:300;text-transform:none;letter-spacing:0;font-size:10px;color:var(--text3);"> — every call, visit, change order, update</span></div>
      <div id="notes-log" style="margin-bottom:10px;max-height:160px;overflow-y:auto;"></div>
      <div class="fg one">
        <div class="fw"><label>Add note</label><textarea id="f-note" placeholder="Log a call, site visit, change order request, client message, material delivery..."></textarea></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn danger" id="del-btn" onclick="deleteJob()" style="display:none;margin-right:auto;">Delete job</button>
      <button class="btn" onclick="closeModal('job-modal')">Cancel</button>
      <button class="btn primary" onclick="saveJob()">Save job</button>
    </div>
  </div>
</div>

<script>
// ── STAGES & CONFIG ──────────────────────────────────────────────
const STAGES=[
  {key:'lead',     label:'Lead',          color:'#606058'},
  {key:'estimate', label:'Estimate Sent', color:'#2980b9'},
  {key:'scheduled',label:'Scheduled',     color:'#6c3483'},
  {key:'active',   label:'Active',        color:'#d35400'},
  {key:'invoice',  label:'Invoice Sent',  color:'#c9952a'},
  {key:'paid',     label:'Paid',          color:'#3a8a52'},
];
const SC=Object.fromEntries(STAGES.map(s=>[s.key,s.color]));
const STORAGE_KEY='fortress_fencing_jobs_v1';
const SYNC_INTERVAL=30000; // 30s auto-sync

let jobs=[], role='', editingId=null, weekOffset=0, syncTimer=null;

// ── AUTH ──────────────────────────────────────────────────────────
function login(r){
  role=r;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('role-badge').textContent=r==='owner'?'Owner':'Office — Cherri';
  document.getElementById('role-badge').className='role-badge '+(r==='owner'?'role-owner':'role-crm');
  if(r==='crm') document.getElementById('owner-fields').style.display='none';
  buildTabs();
  loadAndRender();
  syncTimer=setInterval(syncNow,SYNC_INTERVAL);
}
function logout(){
  clearInterval(syncTimer);
  role='';
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
}

// ── TABS ──────────────────────────────────────────────────────────
function buildTabs(){
  const tabs=role==='owner'
    ?[{id:'pipeline',label:'Pipeline'},{id:'schedule',label:'Schedule'},{id:'invoices',label:'Invoices'}]
    :[{id:'crm',label:'CRM / Leads'},{id:'pipeline',label:'Pipeline'},{id:'schedule',label:'Schedule'}];
  const bar=document.getElementById('tab-bar');
  bar.innerHTML=tabs.map((t,i)=>`<div class="tab${i===0?' active':''}" onclick="switchTab('${t.id}',this)">${t.label}</div>`).join('');
  showView(tabs[0].id);
}
function switchTab(v,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  ['pipeline','crm','schedule','invoices'].forEach(x=>document.getElementById('view-'+x).style.display='none');
  showView(v);
}
function showView(v){
  document.getElementById('view-'+v).style.display='block';
  if(v==='pipeline') renderPipeline();
  if(v==='crm') renderCRM();
  if(v==='schedule') renderSchedule();
  if(v==='invoices') renderInvoices();
  renderStats();
}

// ── CLOUD SYNC ───────────────────────────────────────────────────
function setSyncStatus(s,msg){
  const dot=document.getElementById('sync-dot');
  const lbl=document.getElementById('sync-label');
  dot.className='sync-dot '+(s==='synced'?'synced':s==='syncing'?'syncing':'error');
  lbl.textContent=msg;
}

async function pushToCloud(data){
  try{
    setSyncStatus('syncing','Saving...');
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:100,
        system:'You are a data storage assistant. When given a store command, acknowledge with {"ok":true} only.',
        messages:[{role:'user',content:`STORE_DATA:${STORAGE_KEY}:${JSON.stringify(data)}`}]
      })
    });
    const d=await res.json();
    // Store locally always
    localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
    localStorage.setItem(STORAGE_KEY+'_ts',Date.now().toString());
    setSyncStatus('synced','Saved '+timeAgo(Date.now()));
    return true;
  }catch(e){
    localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
    setSyncStatus('error','Local only');
    return false;
  }
}

async function pullFromCloud(){
  setSyncStatus('syncing','Syncing...');
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:8000,
        system:`You are a data storage assistant for Fortress Fencing Partners LLC job management system. You store and retrieve job data. The storage key is "${STORAGE_KEY}". When asked to retrieve, return ONLY the raw JSON array of jobs with no explanation, no markdown, no extra text. If no data exists yet, return [].`,
        messages:[{role:'user',content:`RETRIEVE_DATA:${STORAGE_KEY}`}]
      })
    });
    const d=await res.json();
    const text=(d.content||[]).find(c=>c.type==='text')?.text||'[]';
    let parsed;
    try{
      // Extract JSON array from response
      const match=text.match(/\[[\s\S]*\]/);
      parsed=match?JSON.parse(match[0]):[];
    }catch(e){parsed=[];}

    // Merge: prefer cloud if newer, local otherwise
    const localRaw=localStorage.getItem(STORAGE_KEY);
    const localTs=parseInt(localStorage.getItem(STORAGE_KEY+'_ts')||'0');
    const localJobs=localRaw?JSON.parse(localRaw):[];

    // Use whichever has more jobs (simple merge strategy)
    if(parsed.length>=localJobs.length){
      jobs=parsed;
    } else {
      jobs=localJobs;
    }
    localStorage.setItem(STORAGE_KEY,JSON.stringify(jobs));
    localStorage.setItem(STORAGE_KEY+'_ts',Date.now().toString());
    setSyncStatus('synced','Synced '+timeAgo(Date.now()));
    return jobs;
  }catch(e){
    // Fall back to local
    const local=localStorage.getItem(STORAGE_KEY);
    jobs=local?JSON.parse(local):[];
    setSyncStatus('error','Using local');
    return jobs;
  }
}

async function syncNow(){
  await pullFromCloud();
  renderAll();
}

async function loadAndRender(){
  // Load local immediately for instant display
  const local=localStorage.getItem(STORAGE_KEY);
  if(local){ try{jobs=JSON.parse(local);}catch(e){jobs=[];} }
  if(jobs.length===0) seedData();
  renderAll();
  // Then sync with cloud
  await syncNow();
}

// ── CRM VIEW (Cherri's home view) ────────────────────────────────
function renderCRM(){
  const el=document.getElementById('view-crm');
  const today=new Date(); today.setHours(0,0,0,0);
  const followups=jobs.filter(j=>j.followup&&!['paid'].includes(j.stage)).sort((a,b)=>new Date(a.followup)-new Date(b.followup));
  const leads=jobs.filter(j=>j.stage==='lead').sort((a,b)=>new Date(b.updated||0)-new Date(a.updated||0));
  const active=jobs.filter(j=>['active','scheduled'].includes(j.stage));
  const invoiced=jobs.filter(j=>j.stage==='invoice');

  function followupTag(d){
    const fd=new Date(d+'T00:00:00');
    if(fd<today) return `<span class="followup-tag ft-urgent">Overdue</span>`;
    if(fd.getTime()===today.getTime()) return `<span class="followup-tag ft-today">Today</span>`;
    return `<span class="followup-tag ft-soon">${fmtDate(d)}</span>`;
  }

  let html=`<div class="crm-grid">`;

  // Follow-ups
  html+=`<div class="crm-section"><div class="crm-section-head"><span>Follow-ups</span><span style="color:var(--red2);">${followups.length} pending</span></div>`;
  if(followups.length===0) html+=`<div class="empty">No follow-ups scheduled.</div>`;
  followups.forEach(j=>{
    html+=`<div class="crm-item" onclick="openJob('${j.id}')">
      <span class="crm-item-val">${SC[j.stage]?`<span style="color:${SC[j.stage]};font-size:10px;">●</span> `:''}</span>
      <div class="crm-item-name">${j.client}</div>
      <div class="crm-item-meta">${j.phone||'No phone'} · ${j.type||'—'}${j.lf?' · '+j.lf+' lf':''}<br>${followupTag(j.followup)}</div>
    </div>`;
  });
  html+=`</div>`;

  // New leads
  html+=`<div class="crm-section"><div class="crm-section-head"><span>New leads</span><span>${leads.length} open</span></div>`;
  if(leads.length===0) html+=`<div class="empty">No open leads.</div>`;
  leads.forEach(j=>{
    html+=`<div class="crm-item" onclick="openJob('${j.id}')">
      <div class="crm-item-name">${j.client} <span class="crm-item-val">${j.value?'$'+fmt(parseFloat(j.value)):''}</span></div>
      <div class="crm-item-meta">${j.phone||'No phone'} · ${j.address||'No address'}<br>${j.type||'—'}${j.lf?' · '+j.lf+' lf':''}</div>
    </div>`;
  });
  html+=`</div>`;

  // Active jobs
  html+=`<div class="crm-section"><div class="crm-section-head"><span>Active jobs</span><span>${active.length} in progress</span></div>`;
  if(active.length===0) html+=`<div class="empty">No active jobs.</div>`;
  active.forEach(j=>{
    html+=`<div class="crm-item" onclick="openJob('${j.id}')">
      <div class="crm-item-name">${j.client} <span class="crm-item-val" style="color:${SC[j.stage]}">${STAGES.find(s=>s.key===j.stage)?.label||''}</span></div>
      <div class="crm-item-meta">${j.type||'—'}${j.lf?' · '+j.lf+' lf':''} · ${j.crew||'Full crew'}<br>
      ${j.start?'Started '+fmtDate(j.start):''}${j.end?' · Due '+fmtDate(j.end):''}
      </div>
    </div>`;
  });
  html+=`</div>`;

  // Invoices awaiting payment
  html+=`<div class="crm-section"><div class="crm-section-head"><span>Awaiting payment</span><span style="color:var(--gold2);">${invoiced.length} invoices out</span></div>`;
  if(invoiced.length===0) html+=`<div class="empty">No outstanding invoices.</div>`;
  invoiced.forEach(j=>{
    const bal=(parseFloat(j.value)||0)-(parseFloat(j.deposit)||0);
    const overdue=j.end&&new Date(j.end)<new Date();
    html+=`<div class="crm-item" onclick="openJob('${j.id}')">
      <div class="crm-item-name">${j.client} <span class="crm-item-val" style="color:${overdue?'var(--red2)':'var(--gold)'}">$${fmt(bal)} due</span></div>

  html+=`</div></div>`;

  el.innerHTML=html;

// ── SCHEDULE ─────────────────────────────────────────────────────
function changeWeek(d){ weekOffset=d===0?0:weekOffset+d; renderSchedule(); }
function getWeekStart(){
  const d=new Date(); d.setDate(d.getDate()-d.getDay()+weekOffset*7); d.setHours(0,0,0,0); return d;
}
function renderSchedule(){
  const ws=getWeekStart();
  const we=new Date(ws); we.setDate(we.getDate()+6);
  const today=new Date(); today.setHours(0,0,0,0);
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const el=document.getElementById('view-schedule');

  let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:1px;color:var(--text2);">
      ${ws.toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${we.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn small" onclick="changeWeek(-1)">← Prev</button>
      <button class="btn small" onclick="changeWeek(0)">Today</button>
      <button class="btn small" onclick="changeWeek(1)">Next →</button>
    </div>
  </div>`;

  const activeJobs=jobs.filter(j=>['scheduled','active'].includes(j.stage)&&j.start);
  html+=`<div class="week-grid"><div class="whc">Job</div>`;
  for(let i=0;i<7;i++){
    const d=new Date(ws); d.setDate(d.getDate()+i);
    const isT=d.getTime()===today.getTime();
    html+=`<div class="whc${isT?' today':''}">${days[i]}<br><span style="font-size:10px;">${d.getDate()}</span></div>`;
  }
  if(activeJobs.length===0){
    html+=`<div style="grid-column:1/-1;"><div class="empty">No scheduled or active jobs this week.</div></div>`;
  }
  activeJobs.forEach(j=>{
    const js=new Date(j.start+'T00:00:00');
    const je=j.end?new Date(j.end+'T00:00:00'):js;
    html+=`<div class="wlabel" title="${j.client}">${j.client?.split(' ')[0]||'Job'}</div>`;
    for(let i=0;i<7;i++){
      const d=new Date(ws); d.setDate(d.getDate()+i);
      const isT=d.getTime()===today.getTime();
      const inR=d>=js&&d<=je;
      html+=`<div class="wrc${isT?' today':''}">
        ${inR?`<div class="sblock" style="background:${SC[j.stage]}22;color:${SC[j.stage]};border-left:2px solid ${SC[j.stage]};" onclick="openJob('${j.id}')">${j.type?.split(' ')[0]||'Fence'}</div>`:''}
      </div>`;
    }
  });
  html+='</div>';

  if(activeJobs.length>0){
    html+=`<div style="margin-top:1.25rem;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:.6rem;">Scheduled &amp; active</div>`;
    activeJobs.forEach(j=>{
      html+=`<div class="job-card" style="margin-bottom:8px;" onclick="openJob('${j.id}')">
        <div class="flag-bar" style="background:${SC[j.stage]}"></div>
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div><div class="jc-name">${j.client}</div><div class="jc-type">${j.type||'—'}${j.lf?' · '+j.lf+' lf':''} · ${j.crew||'Full crew'}</div></div>
          <div style="text-align:right;"><div class="jc-val">${j.value?'$'+fmt(parseFloat(j.value)):''}</div><div class="jc-date">${j.start?fmtDate(j.start):''}${j.end?' → '+fmtDate(j.end):''}</div></div>
        </div>
      </div>`;
    });
  }
  el.innerHTML=html;
}

function togglePaid(id){
  const j=jobs.find(x=>x.id===id); if(!j)return;
  j.stage=j.stage==='paid'?'invoice':'paid';
  if(j.stage==='paid') j.deposit=j.value;
  j.updated=new Date().toISOString();
  saveAndRender();
}

   'f-followup','f-start','f-end','f-hours','f-value','f-deposit','f-actual','f-note','f-dep-calc']

  const data={
    id:editingId||uid(),client,
    phone:document.getElementById('f-phone').value,
    email:document.getElementById('f-email').value,
    address:document.getElementById('f-address').value,
    type:document.getElementById('f-type').value,
    lf:document.getElementById('f-lf').value,
    gates:document.getElementById('f-gates').value,
    scope:document.getElementById('f-scope').value,
    stage:document.getElementById('f-stage').value,
    priority:document.getElementById('f-priority').value,
    followup:document.getElementById('f-followup').value,
    start:document.getElementById('f-start').value,
    end:document.getElementById('f-end').value,
    crew:document.getElementById('f-crew')?.value||'Full crew (3)',
    hours:document.getElementById('f-hours').value,
    value:document.getElementById('f-value').value,
    deposit:document.getElementById('f-deposit').value,
    actual:document.getElementById('f-actual').value,
    notes,updated:new Date().toISOString()
  };
  if(editingId){const i=jobs.findIndex(x=>x.id===editingId);jobs[i]=data;}
  else jobs.unshift(data);
  saveAndRender();
  closeModal('job-modal');
}
function deleteJob(){
  if(!editingId||!confirm('Delete this job permanently?'))return;
  jobs=jobs.filter(x=>x.id!==editingId);
  saveAndRender();
  closeModal('job-modal');
}
async function saveAndRender(){
  renderAll();
  await pushToCloud(jobs);
}

// ── MODALS ────────────────────────────────────────────────────────
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));

// ── UTILS ─────────────────────────────────────────────────────────
function fmt(n){return(n||0).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});}
function fmtDate(s){if(!s)return'';const d=new Date(s+'T00:00:00');return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function timeAgo(ts){const s=Math.floor((Date.now()-ts)/1000);if(s<10)return'just now';if(s<60)return s+'s ago';return Math.floor(s/60)+'m ago';}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function todayStr(d=0){const x=new Date();x.setDate(x.getDate()+d);return x.toISOString().split('T')[0];}
